<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チャット書式ジェネレーター</title>
    <style>
        /* 全体の基本設定 */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.2rem;
            text-align: center;
            color: #444;
            margin-bottom: 20px;
        }

        label.section-title {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            font-size: 0.95rem;
            color: #555;
            border-bottom: 2px solid #007bff;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        /* ツールバーのスタイル */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px 6px 0 0;
            border: 1px solid #ccc;
            border-bottom: none;
        }

        .toolbar button {
            padding: 8px 12px;
            font-size: 1.1rem;
            cursor: pointer;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
            color: #333;
        }

        .toolbar button:hover {
            background: #e9ecef;
        }

        .toolbar input[type="color"] {
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            padding: 0;
            background: white;
        }

        /* エディタ（入力エリア）のスタイル */
        #editor {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 0 0 6px 6px;
            box-sizing: border-box;
            font-size: 1rem;
            background: white;
            outline: none;
            line-height: 1.5;
            overflow-wrap: break-word;
        }

        #editor:focus {
            border-color: #007bff;
            box-shadow: inset 0 0 0 1px #007bff;
        }

        /* プレースホルダー（未入力時の文字） */
        #editor:empty:before {
            content: attr(data-placeholder);
            color: #aaa;
        }

        button.generate-btn {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 12px;
            margin-top: 25px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            transition: background 0.3s;
        }

        button.generate-btn:hover {
            background-color: #0056b3;
        }

        .result-container {
            margin-top: 20px;
            background: #282c34;
            color: #abb2bf;
            padding: 15px;
            border-radius: 6px;
            position: relative;
        }

        .result-text {
            word-break: break-all;
            white-space: pre-wrap;
            font-family: monospace;
            min-height: 40px;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #4caf50;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .copy-btn:hover {
            background: #45a049;
        }

        @media (min-width: 600px) {
            h1 { font-size: 1.6rem; }
            body { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎮 チャット書式ジェネレーター</h1>

        <label class="section-title">1. テキストを入力して装飾する</label>
        <p style="font-size: 0.85rem; color: #666; margin: 0 0 10px 0;">文字を選択してからボタンを押してください。すでにかかっている装飾は、もう一度押すと外れます。</p>
        
        <!-- ツールバー -->
        <div class="toolbar">
            <button onclick="formatText('bold')" title="太線"><b>B</b></button>
            <button onclick="formatText('italic')" title="斜体"><i>I</i></button>
            <button onclick="formatText('underline')" title="下線"><u>U</u></button>
            <button onclick="formatText('strikeThrough')" title="横線"><s>S</s></button>
            <button onclick="formatText('superscript')" title="上付き文字">x<sup>2</sup></button>
            <button onclick="formatText('subscript')" title="下付き文字">x<sub>2</sub></button>
            <input type="color" id="colorPicker" onchange="formatText('foreColor', this.value)" title="文字色">
        </div>

        <!-- エディタ（ここで見た目が変わります） -->
        <div id="editor" contenteditable="true" data-placeholder="ここに文字を入力してください"></div>

        <button class="generate-btn" onclick="generateCode()">コマンドを生成する</button>

        <label class="section-title">2. 生成されたコード</label>
        <div class="result-container">
            <button class="copy-btn" onclick="copyToClipboard()">コピー</button>
            <div id="resultText" class="result-text">ここにコードが表示されます</div>
        </div>
    </div>

    <script>
        // エディタの装飾ボタン用関数
        function formatText(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('editor').focus();
        }

        // RGB形式の色を16進数（HEX）に変換する関数
        function rgbToHex(color) {
            if (color.startsWith('#')) {
                // 3桁のHEX（例：#f00）を6桁（#ff0000）に直す
                if (color.length === 4) {
                    return '#' + color[1] + color[1] + color[2] + color[2] + color[3] + color[3];
                }
                return color;
            }
            const rgb = color.match(/^rgba?\((\d+),\s*(\d+),\s*(\d+)/);
            if (rgb) {
                const hex = (x) => ("0" + parseInt(x).toString(16)).slice(-2);
                return "#" + hex(rgb[1]) + hex(rgb[2]) + hex(rgb[3]);
            }
            return null;
        }

        // HTML要素を解析してゲーム用のタグに変換する再帰関数
        function parseNode(node) {
            // テキストノードの場合はそのまま文字を返す
            if (node.nodeType === Node.TEXT_NODE) {
                return node.textContent;
            }

            // 要素ノード（タグ）以外は無視
            if (node.nodeType !== Node.ELEMENT_NODE) {
                return '';
            }

            let styles = new Set();
            let colorHex = null;
            const tag = node.tagName.toLowerCase();

            // タグ名からスタイルを判定
            if (tag === 'b' || tag === 'strong') styles.add('B');
            if (tag === 'i' || tag === 'em') styles.add('I');
            if (tag === 'u') styles.add('U');
            if (tag === 'strike' || tag === 's') styles.add('S');
            if (tag === 'sup') styles.add('SUP');
            if (tag === 'sub') styles.add('SUB');

            // 属性から色を判定（古いブラウザ仕様対応）
            if (tag === 'font' && node.color) {
                colorHex = rgbToHex(node.color);
            }

            // style属性からスタイルを判定
            if (node.style) {
                if (node.style.fontWeight === 'bold' || parseInt(node.style.fontWeight) >= 700) styles.add('B');
                if (node.style.fontStyle === 'italic') styles.add('I');
                if (node.style.textDecoration.includes('underline')) styles.add('U');
                if (node.style.textDecoration.includes('line-through')) styles.add('S');
                if (node.style.color) {
                    const parsedColor = rgbToHex(node.style.color);
                    if (parsedColor) colorHex = parsedColor;
                }
            }

            let prefix = '';
            let suffix = '';
            const tagBase = "[-[#C0]]";

            // 抽出したスタイルをもとにゲーム用のタグを組み立て
            const appliedStyles = Array.from(styles);
            for (let s of appliedStyles) {
                prefix += `[${tagBase}${s}]`;
                suffix = `[/${tagBase}${s}]` + suffix; // 閉じる時は逆順
            }

            // 色のタグを組み立て [RR[-[#C0]]GGBB]
            if (colorHex) {
                const rr = colorHex.substring(1, 3).toUpperCase();
                const ggbb = colorHex.substring(3, 7).toUpperCase();
                prefix += `[${rr}${tagBase}${ggbb}]`;
                // 色タグは終了タグの仕様がないため、開始タグのみ付与
            }

            // 子要素を再帰的に処理
            let innerText = '';
            for (let child of node.childNodes) {
                innerText += parseNode(child);
            }

            return prefix + innerText + suffix;
        }

        // コマンド生成メイン関数
        function generateCode() {
            const editor = document.getElementById('editor');
            
            if (editor.innerText.trim() === "") {
                alert("テキストを入力してください！");
                return;
            }

            // エディタの中身を解析してタグに変換
            const finalCode = parseNode(editor);
            document.getElementById('resultText').innerText = finalCode;
        }

        // コピー機能
        function copyToClipboard() {
            const resultText = document.getElementById('resultText').innerText;
            if (resultText === "ここにコードが表示されます" || !resultText) return;

            navigator.clipboard.writeText(resultText).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.innerText = "コピー完了！";
                btn.style.background = "#2196F3";
                setTimeout(() => {
                    btn.innerText = "コピー";
                    btn.style.background = "#4caf50";
                }, 2000);
            }).catch(err => {
                alert("コピーに失敗しました");
            });
        }
    </script>
</body>
</html>
